name: Build Patched Fedora Kernel

on:
  push:
    branches:
      - main
    paths:
      - 'linux-kernel-test.patch'
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    container:
      image: fedora:40
    
    steps:
      - name: Checkout Repository Patches
        uses: actions/checkout@v4

      - name: Install Build Dependencies for Fedora Kernel
        run: |
          dnf builddeps -y kernel

      - name: Download and Unpack Fedora Kernel Source Package
        run: |
          dnf download --source kernel
          rpm -Uvh kernel-*.src.rpm --nodeps

      - name: Inject Custom Test Patch into Build Tree
        run: |
          cd ~/
          cp ${{ github.workspace }}/linux-kernel-test.patch ~/rpmbuild/SOURCES/

      - name: Install Explicit Kernel Compiler Dependencies
        run: |
          dnf builddeps -y ~/rpmbuild/SPECS/kernel.spec

      - name: Execute RPM Build (Compile Binary Packages Only)
        run: |
          cd ~/rpmbuild/SPECS
          rpmbuild -bb --without debug kernel.spec

      - name: Upload Finished Kernel RPMs as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: patched-kernel-rpms
          path: ~/rpmbuild/RPMS/x86_64/*.rpm
